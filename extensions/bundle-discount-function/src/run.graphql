query RunInput {
  cart {
    lines {
      quantity
      cost {
        amountPerQuantity {
          amount
          currencyCode
        }
      }
      merchandise {
        ... on ProductVariant {
          id
          product {
            id
            inAnyCollection {
              value
            }
            hasAnyTag(tags: ["bundlebox-fixed", "bundlebox-mix", "bundlebox-volume"]) {
              value
            }
          }
        }
      }
    }
  }
  discountNode {
    metafield(namespace: "bundlebox", key: "config") {
      value
    }
  }
}
